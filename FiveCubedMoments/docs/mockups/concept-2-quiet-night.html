<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Concept 2: Quiet Night — Five Cubed Moments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #121214;
      --surface: #1C1C1E;
      --surface-elevated: #2C2C2E;
      --text: #F5F0E8;
      --text-muted: #9A9A9A;
      --accent: #E8B86D;
      --border: #3A3A3C;
      --complete: #7DB87D;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.55;
    }
    .device {
      max-width: 390px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 36px;
      padding: 24px 20px 40px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .header {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 28px;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .section {
      margin-bottom: 28px;
    }
    .section-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }
    .date-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      background: var(--surface-elevated);
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 16px;
    }
    .badge {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(232, 184, 109, 0.2);
      color: var(--accent);
      margin-left: auto;
      font-weight: 500;
    }
    .input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface-elevated);
      font-family: inherit;
      font-size: 16px;
      color: var(--text);
      margin-bottom: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(232,184,109,0.25); }
    .input::placeholder { color: var(--text-muted); }
    .textarea {
      min-height: 100px;
      resize: vertical;
    }
    .share-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface-elevated);
      color: var(--accent);
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .concept-label {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <p class="concept-label">Concept 2: Quiet Night — Soft Dark Mode</p>
  <div class="device">
    <button class="share-btn" aria-label="Share">↑</button>
    <h1 class="header">Today's 5³</h1>

    <div class="section">
      <div class="section-label">Date</div>
      <div class="date-row">
        Mar 15, 2025
        <span class="badge">Completed</span>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Gratitudes</div>
      <input class="input" type="text" placeholder="Gratitude 1">
      <input class="input" type="text" placeholder="Gratitude 2">
      <input class="input" type="text" placeholder="Gratitude 3">
      <input class="input" type="text" placeholder="Gratitude 4">
      <input class="input" type="text" placeholder="Gratitude 5">
    </div>

    <div class="section">
      <div class="section-label">Needs</div>
      <input class="input" type="text" placeholder="Need 1">
      <input class="input" type="text" placeholder="Need 2">
    </div>

    <div class="section">
      <div class="section-label">People To Pray For</div>
      <input class="input" type="text" placeholder="Person 1">
    </div>

    <div class="section">
      <div class="section-label">Bible Notes</div>
      <textarea class="input textarea" placeholder="Write your notes..."></textarea>
    </div>

    <div class="section">
      <div class="section-label">Reflections</div>
      <textarea class="input textarea" placeholder="Reflect on your day..."></textarea>
    </div>
  </div>
</body>
</html>
