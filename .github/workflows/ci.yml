name: CI

# Triggers (avoid duplicate runs):
# - pull_request → PRs targeting main (lint + build always; full suite when label `full-ci`).
# - push → only default branch (rare: bypass/automation); full CI same as merge queue.
# - merge_group → merge queue commits (lint + tests + XR smoke via Makefile).
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  merge_group:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Match Xcode 26.x + simulators on GitHub macos-15 images (see actions/runner-images macOS-15 readme).
  # Simulator runtimes are 26.0 / 26.1 / 26.2 — not an OS=26.3 label. iPhone XR is not preinstalled; use SE for smoke.
  CI_SIMULATOR_PRO: platform=iOS Simulator,name=iPhone 17 Pro,OS=26.2
  CI_SIMULATOR_SMOKE: platform=iOS Simulator,name=iPhone SE (3rd generation),OS=26.2

jobs:
  lint-build:
    name: Lint & build (iPhone 17 Pro)
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: make lint

      - name: Build
        run: make ci-build

  main-push-full-ci:
    name: Push main — lint, test, UI smoke
    if: github.event_name == 'push'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Full CI (make)
        run: make ci-merge-queue

  merge-queue:
    name: Merge queue — lint, test, UI smoke
    if: github.event_name == 'merge_group'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Full CI (make)
        run: make ci-merge-queue

  pr-full-ci:
    name: PR full-ci — lint, test, UI smoke
    if: >
      github.event_name == 'pull_request' &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'full-ci')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Full CI (make)
        run: make ci-pr-full-ci
