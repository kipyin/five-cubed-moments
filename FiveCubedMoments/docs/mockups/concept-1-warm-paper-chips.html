<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Warm Paper + Chip Flow — Five Cubed Moments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F8F4EF;
      --paper: #F5EDE4;
      --text: #2C2C2C;
      --text-muted: #5C5346;
      --accent: #C77B5B;
      --border: #E5DDD4;
      --complete: #8B9A7D;
      --chip-bg: rgba(255,255,255,0.8);
      --chip-border: #E5DDD4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.5;
    }
    .device {
      max-width: 390px;
      margin: 0 auto;
      background: var(--paper);
      border-radius: 36px;
      padding: 24px 20px 40px;
      box-shadow: 0 4px 24px rgba(44, 44, 44, 0.08);
    }
    .header { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; margin-bottom: 24px; color: var(--text); }
    .section { margin-bottom: 28px; }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .date-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.5);
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 15px;
    }
    .badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: var(--complete); color: white; margin-left: auto; }

    /* Chip flow */
    .chip-area {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px;
      min-height: 52px;
      background: rgba(255,255,255,0.5);
      border-radius: 14px;
      border: 1px solid var(--border);
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      border-radius: 20px;
      font-size: 15px;
      color: var(--text);
    }
    .chip-remove { cursor: pointer; font-size: 14px; color: var(--text-muted); opacity: 0.7; }
    .chip-add {
      padding: 8px 14px;
      border: 1px dashed var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      background: transparent;
    }
    .chip-input {
      flex: 1;
      min-width: 80px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
    }
    .chip-input:focus { outline: none; }
    .chip-input::placeholder { color: var(--text-muted); opacity: 0.6; }

    .textarea {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,0.6);
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      min-height: 100px;
      resize: vertical;
    }
    .textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(199,123,91,0.2); }
    .textarea::placeholder { color: var(--text-muted); opacity: 0.7; }

    .share-btn { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 10px; background: var(--accent); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .concept-label { text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
  </style>
</head>
<body>
  <p class="concept-label">Warm Paper + Chip Flow — No list, items as tags</p>
  <div class="device">
    <button class="share-btn" aria-label="Share">↑</button>
    <h1 class="header">Today's 5³</h1>

    <div class="section">
      <div class="section-label">Date</div>
      <div class="date-row">Mar 15, 2025 <span class="badge">Completed</span></div>
    </div>

    <div class="section">
      <div class="section-label">Gratitudes</div>
      <div class="chip-area">
        <span class="chip">Family <span class="chip-remove">×</span></span>
        <span class="chip">Morning coffee <span class="chip-remove">×</span></span>
        <span class="chip">Health <span class="chip-remove">×</span></span>
        <span class="chip-add">+ Add</span>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Needs</div>
      <div class="chip-area">
        <span class="chip">Patience <span class="chip-remove">×</span></span>
        <span class="chip">Rest <span class="chip-remove">×</span></span>
        <input class="chip-input" type="text" placeholder="Type & add…">
      </div>
    </div>

    <div class="section">
      <div class="section-label">People To Pray For</div>
      <div class="chip-area">
        <span class="chip">Sarah <span class="chip-remove">×</span></span>
        <span class="chip">Mom <span class="chip-remove">×</span></span>
        <span class="chip-add">+ Add</span>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Bible Notes</div>
      <textarea class="textarea" placeholder="Write your notes..."></textarea>
    </div>

    <div class="section">
      <div class="section-label">Reflections</div>
      <textarea class="textarea" placeholder="Reflect on your day..."></textarea>
    </div>
  </div>
</body>
</html>
